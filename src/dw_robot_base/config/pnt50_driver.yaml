pnt50_driver_node:
  ros__parameters:
    wheel_cmd_topic: "/wheel_cmd"
    brake_topic: "/brake_cmd"

    port: "/dev/ttyUSB0"
    baudrate: 19200
    slave_id: 1

    max_rpm: 500

    left_is_motor1: true
    left_sign: 1
    right_sign: 1

    cmd_timeout: 0.5
    send_rate: 50.0

    use_dual_pid207: true