cmd_vel_safety_node:
  ros__parameters:
    input_topic: /cmd_vel_raw
    output_topic: /cmd_vel_safe

    publish_rate: 50.0
    cmd_vel_timeout: 0.5

    max_linear_velocity: 5.76
    max_lateral_velocity: 5.76
    max_angular_velocity: 29.54

    max_linear_acceleration: 20.0
    max_angular_acceleration: 120.0

    enable_acceleration_limit: true